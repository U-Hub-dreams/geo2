<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>仲間あつめJAPAN（プロトタイプ）</title>

  <!-- Leaflet (CDN) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root{
      --bg:#0b1020;
      --panel:#101a33;
      --panel2:#0f1730;
      --text:#e9eefc;
      --muted:#aab4d6;
      --accent:#7aa7ff;
      --good:#50e3c2;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --border:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 600px at 20% 0%, #172a55, var(--bg));
      color:var(--text);
    }
    header{
      padding:14px 14px 10px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      position:sticky; top:0;
      background: linear-gradient(to bottom, rgba(11,16,32,.92), rgba(11,16,32,.65));
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
      z-index:1000;
    }
    .title{
      display:flex; flex-direction:column; gap:2px;
      min-width: 0;
    }
    .title h1{
      margin:0;
      font-size:16px;
      letter-spacing:.3px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .title .sub{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .wrap{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:12px;
      padding:12px;
      max-width: 1200px;
      margin:0 auto;
    }
    @media (max-width: 980px){
      .wrap{ grid-template-columns: 1fr; }
    }
    .card{
      background: linear-gradient(180deg, rgba(16,26,51,.92), rgba(15,23,48,.92));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card .card-h{
      padding:12px 12px 10px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .card .card-h .h{
      font-weight:700;
      font-size:14px;
    }
    .card .card-b{ padding:12px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    label{
      font-size:12px;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      gap:6px;
      flex: 1;
      min-width: 130px;
    }
    select, input{
      width:100%;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(0,0,0,.20);
      color: var(--text);
      outline:none;
    }
    button{
      border:1px solid var(--border);
      background: rgba(122,167,255,.14);
      color: var(--text);
      padding:10px 12px;
      border-radius: 12px;
      font-weight:700;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease, opacity .15s ease;
      user-select:none;
    }
    button:hover{ background: rgba(122,167,255,.22); }
    button:active{ transform: translateY(1px); }
    button.secondary{ background: rgba(255,255,255,.06); }
    button.good{ background: rgba(80,227,194,.16); }
    button.warn{ background: rgba(255,204,102,.16); }
    button.bad{ background: rgba(255,107,107,.16); }
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .pill{
      font-size:12px;
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      color: var(--muted);
      background: rgba(0,0,0,.18);
      white-space:nowrap;
    }
    .log{
      margin-top:10px;
      padding:10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.18);
      height: 150px;
      overflow:auto;
      font-size: 12px;
      line-height: 1.45;
      color: #d7def7;
    }
    .log b{ color: var(--text); }
    .score{
      display:grid;
      grid-template-columns: 1fr;
      gap:8px;
      margin-top:10px;
    }
    .score .p{
      border:1px solid var(--border);
      background: rgba(0,0,0,.16);
      border-radius: 14px;
      padding:10px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .p .left{ display:flex; align-items:center; gap:10px; min-width:0; }
    .dot{
      width:12px; height:12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.35);
      flex: 0 0 auto;
    }
    .p .name{
      font-weight:800;
      font-size:13px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .p .meta{
      color: var(--muted);
      font-size: 12px;
      white-space:nowrap;
    }
    #map{
      height: calc(100vh - 110px);
      min-height: 520px;
      border-radius: var(--radius);
    }
    @media (max-width: 980px){
      #map{ height: 62vh; min-height: 420px; }
    }
    .hint{
      font-size:12px;
      color: var(--muted);
      margin-top:8px;
      line-height:1.45;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 8px;
      color: var(--text);
      background: rgba(0,0,0,.20);
      display:inline-block;
    }
  </style>
</head>

<body>
  <header>
    <div class="title">
      <h1>仲間あつめJAPAN（プロトタイプ）</h1>
      <div class="sub">2〜4人対戦 / サイコロで隣接市町村へ移動 / 人口＝仲間</div>
    </div>
    <div class="pill" id="statusPill">未開始</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="card-h">
        <div class="h">ゲーム設定</div>
        <button class="secondary" id="resetBtn" title="最初から">リセット</button>
      </div>
      <div class="card-b">
        <div class="row">
          <label>
            人数（2〜4）
            <select id="playerCount">
              <option value="2">2人</option>
              <option value="3">3人</option>
              <option value="4">4人</option>
            </select>
          </label>
          <label>
            スタート市町村（相談して決める）
            <select id="startMunicipality"></select>
          </label>
        </div>

        <div class="row" style="margin-top:10px;">
          <button id="startBtn" class="good">ゲーム開始</button>
          <button id="rollBtn" class="warn" disabled>サイコロを振る</button>
          <button id="endBtn" class="bad" disabled>ゲーム終了</button>
        </div>

        <div class="row" style="margin-top:10px;">
          <div class="pill">手番：<b id="turnLabel">-</b></div>
          <div class="pill">出目：<b id="diceLabel">-</b></div>
          <div class="pill">残り移動：<b id="stepsLabel">-</b></div>
        </div>

        <div class="hint">
          使い方：<span class="kbd">サイコロ</span> → ハイライトされた隣接市町村をクリックして移動。<br/>
          ルール：最初に到着した市町村の人口を獲得（以後は誰が行っても加点なし）。
        </div>

        <div class="score" id="scoreBoard"></div>

        <div class="log" id="log"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-h">
        <div class="h">マップ</div>
        <div class="pill">点＝市町村（サンプル）</div>
      </div>
      <div class="card-b" style="padding:12px;">
        <div id="map"></div>
      </div>
    </div>
  </div>

<script>
/**
 * ===========================
 * 市町村データ（サンプル）
 * ===========================
 * 全国版にする場合は、ここを増やすだけで動きます：
 * { id, name, pop, lat, lng, neighbors:[id...] }
 */
const MUNICIPALITIES = [
  // 東京あたり（例）
  { id:"tokyo-chiyoda", name:"東京都 千代田区", pop: 66840, lat:35.6938, lng:139.7530, neighbors:["tokyo-chuo","tokyo-minato","tokyo-shinjuku","tokyo-bunkyo","tokyo-taito"] },
  { id:"tokyo-chuo",   name:"東京都 中央区",   pop: 173000, lat:35.6706, lng:139.7720, neighbors:["tokyo-chiyoda","tokyo-minato","tokyo-koto","tokyo-sumida","tokyo-taito"] },
  { id:"tokyo-minato", name:"東京都 港区",     pop: 260000, lat:35.6581, lng:139.7516, neighbors:["tokyo-chiyoda","tokyo-chuo","tokyo-shinagawa","tokyo-shibuya","tokyo-shinjuku"] },
  { id:"tokyo-shinjuku", name:"東京都 新宿区", pop: 350000, lat:35.6938, lng:139.7034, neighbors:["tokyo-chiyoda","tokyo-minato","tokyo-shibuya","tokyo-nakano","tokyo-bunkyo"] },
  { id:"tokyo-shibuya", name:"東京都 渋谷区",  pop: 240000, lat:35.6618, lng:139.7041, neighbors:["tokyo-minato","tokyo-shinjuku","tokyo-nakano","tokyo-setagaya","tokyo-meguro"] },
  { id:"tokyo-bunkyo", name:"東京都 文京区",   pop: 240000, lat:35.7081, lng:139.7520, neighbors:["tokyo-chiyoda","tokyo-shinjuku","tokyo-taito","tokyo-kita"] },
  { id:"tokyo-taito", name:"東京都 台東区",    pop: 210000, lat:35.7126, lng:139.7781, neighbors:["tokyo-chiyoda","tokyo-chuo","tokyo-bunkyo","tokyo-sumida","tokyo-arakawa"] },
  { id:"tokyo-sumida", name:"東京都 墨田区",   pop: 270000, lat:35.7107, lng:139.8015, neighbors:["tokyo-chuo","tokyo-taito","tokyo-koto","tokyo-edogawa","tokyo-arakawa"] },
  { id:"tokyo-koto", name:"東京都 江東区",     pop: 520000, lat:35.6731, lng:139.8170, neighbors:["tokyo-chuo","tokyo-sumida","tokyo-edogawa","tokyo-minato"] },
  // 埼玉寄り（例）
  { id:"saitama-koshigaya", name:"埼玉県 越谷市", pop: 345000, lat:35.8912, lng:139.7900, neighbors:["saitama-soka","saitama-kasukabe","tokyo-adachi"] },
  { id:"saitama-soka",     name:"埼玉県 草加市", pop: 250000, lat:35.8254, lng:139.8049, neighbors:["saitama-koshigaya","tokyo-adachi"] },
  { id:"saitama-kasukabe", name:"埼玉県 春日部市", pop: 230000, lat:35.9750, lng:139.7520, neighbors:["saitama-koshigaya"] },
  { id:"tokyo-adachi",     name:"東京都 足立区", pop: 690000, lat:35.7750, lng:139.8040, neighbors:["saitama-soka","saitama-koshigaya","tokyo-kita","tokyo-arakawa"] },
  { id:"tokyo-kita",       name:"東京都 北区",   pop: 350000, lat:35.7528, lng:139.7335, neighbors:["tokyo-bunkyo","tokyo-adachi","tokyo-arakawa"] },
  { id:"tokyo-arakawa",    name:"東京都 荒川区", pop: 220000, lat:35.7369, lng:139.7833, neighbors:["tokyo-taito","tokyo-sumida","tokyo-adachi","tokyo-kita"] },
  // 西側をちょい足し
  { id:"tokyo-nakano",     name:"東京都 中野区", pop: 340000, lat:35.7074, lng:139.6638, neighbors:["tokyo-shinjuku","tokyo-shibuya"] },
  { id:"tokyo-setagaya",   name:"東京都 世田谷区", pop: 920000, lat:35.6466, lng:139.6532, neighbors:["tokyo-shibuya","tokyo-meguro"] },
  { id:"tokyo-meguro",     name:"東京都 目黒区", pop: 280000, lat:35.6413, lng:139.6982, neighbors:["tokyo-shibuya","tokyo-setagaya","tokyo-shinagawa"] },
  { id:"tokyo-shinagawa",  name:"東京都 品川区", pop: 410000, lat:35.6090, lng:139.7300, neighbors:["tokyo-minato","tokyo-meguro"] },
];

// ====== ユーティリティ ======
const byId = Object.fromEntries(MUNICIPALITIES.map(m => [m.id, m]));
const fmt = new Intl.NumberFormat("ja-JP");
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function nowTime(){
  const d = new Date();
  return d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
}

// ====== UI参照 ======
const elStatus = document.getElementById("statusPill");
const elPlayerCount = document.getElementById("playerCount");
const elStartMunicipality = document.getElementById("startMunicipality");
const elStartBtn = document.getElementById("startBtn");
const elRollBtn = document.getElementById("rollBtn");
const elEndBtn = document.getElementById("endBtn");
const elResetBtn = document.getElementById("resetBtn");

const elTurn = document.getElementById("turnLabel");
const elDice = document.getElementById("diceLabel");
const elSteps = document.getElementById("stepsLabel");
const elLog = document.getElementById("log");
const elScore = document.getElementById("scoreBoard");

// ====== ゲーム状態 ======
const COLORS = ["#7aa7ff","#50e3c2","#ffcc66","#ff6b6b"]; // 見分け用（Leaflet側にも使う）
let map, markersLayer;
let game = null;

/**
 * game = {
 *   started: bool,
 *   players: [{name,color,score,posId}],
 *   turnIndex: number,
 *   stepsLeft: number,
 *   dice: number|null,
 *   claimedBy: { [municipalityId]: playerIndex },
 *   mode: "idle" | "needMove"
 * }
 */

// ====== 初期化 ======
initSelect();
initMap();
renderScoreboard([]);
logLine("準備OK。人数とスタート市町村を選んで「ゲーム開始」してください。");

elStartBtn.addEventListener("click", startGame);
elRollBtn.addEventListener("click", rollDice);
elEndBtn.addEventListener("click", endGame);
elResetBtn.addEventListener("click", resetAll);

// ====== セレクト埋め ======
function initSelect(){
  const opts = MUNICIPALITIES
    .slice()
    .sort((a,b)=> a.name.localeCompare(b.name,"ja"))
    .map(m => `<option value="${m.id}">${m.name}</option>`)
    .join("");
  elStartMunicipality.innerHTML = opts;
  // デフォルト：越谷市があれば選ぶ
  if (byId["saitama-koshigaya"]) elStartMunicipality.value = "saitama-koshigaya";
}

// ====== 地図 ======
function initMap(){
  map = L.map('map', { zoomControl:true }).setView([35.78, 139.76], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  markersLayer = L.layerGroup().addTo(map);

  // 初期表示（未開始なのでニュートラル）
  redrawMarkers(null);
}

function redrawMarkers(g){
  markersLayer.clearLayers();

  for(const m of MUNICIPALITIES){
    const claimed = g?.claimedBy?.[m.id];
    const isClaimed = Number.isInteger(claimed);
    const color = isClaimed ? COLORS[claimed] : "rgba(255,255,255,.55)";

    const marker = L.circleMarker([m.lat, m.lng], {
      radius: 8,
      weight: 2,
      opacity: 1,
      color: color,
      fillColor: color,
      fillOpacity: isClaimed ? 0.55 : 0.18
    });

    marker.on("click", () => onMunicipalityClick(m.id));
    marker.bindPopup(popupHtml(m, g));
    marker.addTo(markersLayer);

    // ハイライト（手番で移動候補）
    if(g?.started && g.mode === "needMove"){
      const curId = g.players[g.turnIndex].posId;
      const candidates = getNeighbors(curId);
      if(candidates.includes(m.id)){
        marker.setStyle({
          radius: 10,
          weight: 3,
          color: "rgba(255,255,255,.95)",
          fillOpacity: 0.25
        });
      }
      // 現在地はさらに強調
      if(m.id === curId){
        marker.setStyle({
          radius: 12,
          weight: 3,
          color: COLORS[g.turnIndex],
          fillColor: COLORS[g.turnIndex],
          fillOpacity: 0.70
        });
      }
    }
  }
}

function popupHtml(m, g){
  const claimed = g?.claimedBy?.[m.id];
  let owner = "未獲得";
  if(Number.isInteger(claimed)){
    owner = `獲得者：<b>${g.players[claimed].name}</b>`;
  }
  return `
    <div style="min-width:220px">
      <div style="font-weight:800; margin-bottom:4px;">${escapeHtml(m.name)}</div>
      <div style="font-size:12px; opacity:.9;">人口：<b>${fmt.format(m.pop)}</b></div>
      <div style="font-size:12px; margin-top:4px;">${owner}</div>
      <div style="font-size:11px; opacity:.85; margin-top:6px;">隣接：${m.neighbors.map(id=>escapeHtml(byId[id]?.name ?? id)).join(" / ")}</div>
      <div style="font-size:11px; opacity:.75; margin-top:6px;">（クリックで移動できます）</div>
    </div>
  `;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

// ====== ゲーム開始 ======
function startGame(){
  const n = Number(elPlayerCount.value);
  const startId = elStartMunicipality.value;

  const players = Array.from({length:n}, (_,i)=>({
    name: `Player ${i+1}`,
    color: COLORS[i],
    score: 0,
    posId: startId
  }));

  game = {
    started: true,
    players,
    turnIndex: 0,
    stepsLeft: 0,
    dice: null,
    claimedBy: {},
    mode: "idle"
  };

  // スタート地点は「誰も獲得していない」扱いにして、最初の到着で獲得…でもいいですが、
  // ここでは「開始時に全員が同じ地点にいる」ので、開始と同時に「先手が獲得」とします。
  claimIfUnclaimed(startId, 0, true);

  elStatus.textContent = "進行中";
  elStartBtn.disabled = true;
  elPlayerCount.disabled = true;
  elStartMunicipality.disabled = true;
  elRollBtn.disabled = false;
  elEndBtn.disabled = false;

  updateTurnUi();
  redrawMarkers(game);

  logLine(`ゲーム開始！スタート：<b>${byId[startId].name}</b>（先手が獲得）`);
  logLine(`手番：<b>${game.players[0].name}</b>`);
}

// ====== サイコロ ======
function rollDice(){
  if(!game?.started) return;
  if(game.mode !== "idle") return;

  game.dice = randInt(1,6);
  game.stepsLeft = game.dice;
  game.mode = "needMove";

  updateTurnUi();
  redrawMarkers(game);

  const cur = game.players[game.turnIndex];
  logLine(`<b>${cur.name}</b> がサイコロ：<b>${game.dice}</b>。隣接市町村をクリックして移動してください。`);
}

// ====== 市町村クリック（移動） ======
function onMunicipalityClick(targetId){
  if(!game?.started) return;

  // 地図のポップアップも見やすいので、クリックでポップアップが出るのはLeaflet側に任せつつ、移動も処理
  if(game.mode !== "needMove") return;

  const curPlayer = game.players[game.turnIndex];
  const curId = curPlayer.posId;
  const neighbors = getNeighbors(curId);

  if(!neighbors.includes(targetId)){
    // 候補外クリックは無視（ログだけ軽く出す）
    return;
  }

  // 1歩進む
  curPlayer.posId = targetId;
  game.stepsLeft -= 1;

  const movedName = byId[targetId].name;
  logLine(`<b>${curPlayer.name}</b> → ${escapeHtml(movedName)}（残り <b>${game.stepsLeft}</b>）`);

  // 到着時に獲得（未獲得なら）
  claimIfUnclaimed(targetId, game.turnIndex, false);

  // 0になったらターン終了
  if(game.stepsLeft <= 0){
    endTurn();
  }

  updateTurnUi();
  redrawMarkers(game);
}

// ====== ターン処理 ======
function endTurn(){
  const p = game.players[game.turnIndex];
  logLine(`<span style="opacity:.9;">${escapeHtml(p.name)} の手番終了。</span>`);

  game.turnIndex = (game.turnIndex + 1) % game.players.length;
  game.dice = null;
  game.stepsLeft = 0;
  game.mode = "idle";

  const next = game.players[game.turnIndex];
  logLine(`次の手番：<b>${escapeHtml(next.name)}</b>`);
}

function updateTurnUi(){
  if(!game?.started){
    elTurn.textContent = "-";
    elDice.textContent = "-";
    elSteps.textContent = "-";
    return;
  }
  const p = game.players[game.turnIndex];
  elTurn.textContent = p.name;
  elDice.textContent = game.dice ?? "-";
  elSteps.textContent = game.mode === "needMove" ? game.stepsLeft : "-";

  renderScoreboard(game.players);
  // サイコロボタンは「移動中は無効」
  elRollBtn.disabled = (game.mode !== "idle");
}

function renderScoreboard(players){
  if(!players.length){
    elScore.innerHTML = `<div class="hint">スコアはここに表示されます。</div>`;
    return;
  }
  elScore.innerHTML = players.map((p,i)=>`
    <div class="p" style="${i===game.turnIndex ? 'outline:2px solid rgba(255,255,255,.12);' : ''}">
      <div class="left">
        <div class="dot" style="background:${p.color}"></div>
        <div class="name">${escapeHtml(p.name)}</div>
      </div>
      <div class="meta">仲間：<b style="color:var(--text)">${fmt.format(p.score)}</b></div>
    </div>
  `).join("");
}

function getNeighbors(id){
  const m = byId[id];
  if(!m) return [];
  return m.neighbors.filter(n => !!byId[n]);
}

function claimIfUnclaimed(muniId, playerIndex, isStart){
  if(Number.isInteger(game.claimedBy[muniId])) return;

  game.claimedBy[muniId] = playerIndex;
  const p = game.players[playerIndex];
  const pop = byId[muniId].pop;
  p.score += pop;

  const tag = isStart ? "開始地点獲得" : "獲得";
  logLine(`<b>${p.name}</b> が ${escapeHtml(byId[muniId].name)} を${tag}！ +<b>${fmt.format(pop)}</b>`);
  renderScoreboard(game.players);
}

function endGame(){
  if(!game?.started) return;

  // 勝者判定（同点あり）
  const max = Math.max(...game.players.map(p=>p.score));
  const winners = game.players.filter(p=>p.score===max).map(p=>p.name);

  elStatus.textContent = "終了";
  elRollBtn.disabled = true;
  elEndBtn.disabled = true;

  logLine(`<hr style="border:0;border-top:1px solid rgba(255,255,255,.12);margin:10px 0;">`);
  logLine(`ゲーム終了！ 優勝：<b>${escapeHtml(winners.join(" / "))}</b>（仲間 ${fmt.format(max)}）`);

  game.started = false; // 進行停止
}

function resetAll(){
  game = null;
  elStatus.textContent = "未開始";
  elStartBtn.disabled = false;
  elPlayerCount.disabled = false;
  elStartMunicipality.disabled = false;
  elRollBtn.disabled = true;
  elEndBtn.disabled = true;

  elLog.innerHTML = "";
  logLine("リセットしました。人数とスタート市町村を選んで「ゲーム開始」してください。");
  renderScoreboard([]);
  updateTurnUi();
  redrawMarkers(null);
}

function logLine(html){
  elLog.insertAdjacentHTML("beforeend", `<div><span style="opacity:.65;">[${nowTime()}]</span> ${html}</div>`);
  elLog.scrollTop = elLog.scrollHeight;
}
</script>
</body>
</html>
